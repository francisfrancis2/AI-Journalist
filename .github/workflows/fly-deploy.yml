name: Deploy to Fly.io

on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    name: Deploy backend
    runs-on: ubuntu-latest
    concurrency: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Create app if it does not exist
        run: flyctl apps create aijournalist-backend --machines 2>/dev/null || true
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Set secrets
        run: |
          flyctl secrets set \
            --app aijournalist-backend \
            --stage \
            ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            TAVILY_API_KEY="${{ secrets.TAVILY_API_KEY }}" \
            NEWS_API_KEY="${{ secrets.NEWS_API_KEY }}" \
            ALPHA_VANTAGE_API_KEY="${{ secrets.ALPHA_VANTAGE_API_KEY }}" \
            YOUTUBE_API_KEY="${{ secrets.YOUTUBE_API_KEY }}" \
            DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            JWT_SECRET_KEY="${{ secrets.JWT_SECRET_KEY }}" \
            ADMIN_EMAIL="${{ secrets.ADMIN_EMAIL }}" \
            ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}" \
            AWS_ACCESS_KEY_ID="test" \
            AWS_SECRET_ACCESS_KEY="test" \
            CORS_ORIGINS="https://aijournalist-frontend.fly.dev" \
            TRUSTED_HOSTS="aijournalist-backend.fly.dev,aijournalist-backend.internal"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy
        run: flyctl deploy --config fly.backend.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-frontend:
    name: Deploy frontend
    runs-on: ubuntu-latest
    concurrency: deploy-frontend
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Create app if it does not exist
        run: flyctl apps create aijournalist-frontend --machines 2>/dev/null || true
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy
        run: flyctl deploy --config fly.frontend.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
