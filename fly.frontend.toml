app = "aijournalist-frontend"
primary_region = "sin"

[build]
  dockerfile = "frontend/Dockerfile"
  build_target = ""

  [build.args]
    # Points the Next.js server-side proxy at the backend Fly app
    BACKEND_INTERNAL_URL = "https://aijournalist-backend.fly.dev"

[env]
  NODE_ENV              = "production"
  NEXT_TELEMETRY_DISABLED = "1"
  # Empty → browser uses relative URLs, proxied by Next.js rewrites
  NEXT_PUBLIC_API_URL   = ""
  # Runtime target for Next.js server-side rewrites
  BACKEND_INTERNAL_URL  = "https://aijournalist-backend.fly.dev"

[http_service]
  internal_port        = 3000
  force_https          = true
  auto_stop_machines   = true
  auto_start_machines  = true
  min_machines_running = 0
  processes            = ["app"]

  [[http_service.checks]]
    grace_period = "5s"
    interval     = "30s"
    method       = "GET"
    timeout      = "5s"
    path         = "/"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512"
