version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: aijournalist-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: aijournalist
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: aijournalist
    expose:
      - "5432"
    networks:
      - internal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aijournalist -d aijournalist"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── LocalStack (S3 emulation for local dev) ─────────────────────────────────
  localstack:
    image: localstack/localstack:3
    container_name: aijournalist-localstack
    restart: unless-stopped
    environment:
      SERVICES: s3
      DEFAULT_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      LOCALSTACK_AUTH_TOKEN: ""
    expose:
      - "4566"
    networks:
      - internal
    volumes:
      - localstack_data:/var/lib/localstack
      - ./scripts/localstack-init.sh:/etc/localstack/init/ready.d/init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health | grep -q 's3'"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: aijournalist-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
      S3_ENDPOINT_URL: http://localstack:4566
    # No host port mapping — backend is only reachable within the internal network
    expose:
      - "8000"
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
      localstack:
        condition: service_started
    volumes:
      - ./backend:/app/backend
    command: uvicorn backend.api.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Next.js Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        BACKEND_INTERNAL_URL: http://backend:8000
    container_name: aijournalist-frontend
    restart: unless-stopped
    environment:
      # Empty string → api.ts uses relative URLs → Next.js rewrites proxy to backend
      NEXT_PUBLIC_API_URL: ""
      # Server-side proxy target (used by next.config.ts rewrites, never exposed to browser)
      BACKEND_INTERNAL_URL: http://backend:8000
    ports:
      - "3000:3000"
    networks:
      - internal
    depends_on:
      - backend

volumes:
  postgres_data:
  localstack_data:

networks:
  internal:
    driver: bridge
