app = "aijournalist-backend"
primary_region = "sin"  # Singapore — closest to Neon ap-southeast-1

[build]
  dockerfile = "backend/Dockerfile"
  # Build context is the repo root (alembic.ini lives there)
  build_target = ""

[env]
  PYTHONPATH       = "/app"
  AWS_REGION       = "us-east-1"
  S3_BUCKET_SCRIPTS = "ai-journalist-scripts"
  S3_BUCKET_ASSETS  = "ai-journalist-assets"
  LOG_LEVEL        = "INFO"
  DEBUG            = "false"

[http_service]
  internal_port        = 8000
  force_https          = true
  auto_stop_machines   = true
  auto_start_machines  = true
  min_machines_running = 1
  processes            = ["app"]

  [[http_service.checks]]
    grace_period  = "120s"
    interval      = "30s"
    method        = "GET"
    timeout       = "10s"
    path          = "/health"

[[vm]]
  size   = "performance-2x"   # 4 GB RAM — Playwright requires it
  memory = "4096"
